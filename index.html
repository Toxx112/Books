<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Литературный Гид: Подробные пересказы (5 класс)</title>
    <style>
        :root {
            --bg-color: #08090f;
            --panel-bg: #141628;
            --card-inner: #1b1d36;
            --accent-cyan: #00ffdc;
            --accent-purple: #9d4edd;
            --text-main: #f0f5ff;
            --text-muted: #7d85a6;
            --glow-cyan: 0 0 15px rgba(0, 255, 220, 0.25);
            --glow-purple: 0 0 15px rgba(157, 78, 221, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            width: 100%;
            max-width: 1200px;
        }

        header h1 {
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 255, 220, 0.4);
            color: #fff;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1250px;
            gap: 25px;
        }

        .sidebar {
            flex: 1.1;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 85vh;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .section-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 800;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-title.required { border-bottom: 1px solid rgba(0, 255, 220, 0.2); }
        .section-title.extra { border-bottom: 1px solid rgba(157, 78, 221, 0.2); }
        .section-title:first-child { margin-top: 0; }

        .book-btn {
            display: block;
            width: 100%;
            padding: 11px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            color: var(--text-main);
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
            transition: all 0.25s ease;
        }

        .required-list .book-btn:hover, .required-list .book-btn.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 255, 220, 0.04);
            box-shadow: var(--glow-cyan);
        }

        .extra-list .book-btn:hover, .extra-list .book-btn.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(157, 78, 221, 0.04);
            box-shadow: var(--glow-purple);
        }

        .workspace {
            flex: 1.6;
            background: var(--panel-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
        }

        .content-card {
            background: var(--card-inner);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-cyan);
        }

        .content-card.extra-border {
            border-left-color: var(--accent-purple);
        }

        .book-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .book-author {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-box {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-main);
            opacity: 0;
            transform: translateY(8px);
        }

        .summary-box p {
            margin-bottom: 15px;
        }

        .fade-in {
            animation: textReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes textReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .badge.req { background: rgba(0, 255, 220, 0.1); color: var(--accent-cyan); }
        .badge.ext { background: rgba(157, 78, 221, 0.15); color: var(--accent-purple); }
    </style>
</head>

                text: `<p><b>Скотный двор царя Авгия:</b> Царь Элиды Авгий обладал огромными стадами, но его скотный двор не очищался тридцать лет. Царь решил поиздеваться над Гераклом и приказал ему убрать весь навоз за один единственный день, пообещав десятую часть своих стад. Геракл проявил смекалку: он сломал стену двора с двух сторон и изменил русла рек Алфей и Пеней. Мощный поток воды за несколько часов начисто вымыл весь двор. Авгий пожадничал и не отдал обещанную награду, за что позже был сурово наказан героем.</p>
                       <p><b>Яблоки Гесперид:</b> Гераклу нужно было принести три золотых яблока от титана Атланта, державшего на плечах небосвод. Проделав тяжелый путь, Геракл договорился со старым титаном: пока Атлант ходит в сад за яблоками, Геракл подержит вместо него небо. Вернувшись с яблоками, Атлант не захотел забирать небо назад. Тогда Геракл пошел на хитрость: он согласился, но попросил Атланта подержать небо секунду, пока он подложит подушку под плечи. Как только титан взял ношу, Геракл забрал яблоки и ушел.</p>`

            fairy_tales: {
                author: "Русские народные сказки", title: "«Царевна-лягушка», «Журавль и цапля», «Солдатская шинель»", isExtra: false,
                text: `<p><b>Царевна-лягушка:</b> Три царевича пустили стрелы, чтобы найти невест. Стрела младшего, Ивана, попала в болото к лягушке, которая оказалась Василисой Премудрой. На пиру у царя она поразила всех своим волшебством. Иван-царевич тайно сжег её лягушачью кожу, из-за чего Василиса была вынуждена улететь к Кощею Бессмертному. Иван прошел через множество испытаний, подружился с животными, нашел смерть Кощея на конце иглы и спас свою жену.</p>
                       <p><b>Журавль и цапля:</b> Сказка о том, как на одном болоте жили журавль и цапля. Скучно им стало жить поодиночке, и журавль пошел свататься к цапле. Цапля его прогнала, обозвав длинноногим. Потом она пожалела об этом и сама пришла к журавлю, но теперь уже гордый журавль отказал ей. Так они до сих пор ходят друг к другу по очереди, спорят и никак не могут пожениться из-за своей гордости.</p>
                       <p><b>Солдатская шинель:</b> Служивый солдат пожалел проезжего барина и разрешил ему отдохнуть на своей шинели, показав, как под голову кладет кулак, а укрывается полой. Барин удивился, какая «удобная» вещь, и выкупил её за большие деньги. Дома барин попытался лечь так же, но отбил кулак и замерз. Он пожаловался полковому командиру, на что солдат ответил: шинель греет и служит хорошо только тому, кто честно трудится и устает на службе.</p>`
            },
            krylov: {
                author: "И. А. Крылов", title: "Басни («Волк на псарне», «Листы и Корни», «Свинья под Дубом»)", isExtra: false,
                text: `<p><b>Волк на псарне:</b> Замыслив забраться в овчарню к овцам, хитрый серый Волк по ошибке попадает ночью на псарню. Псы поднимают тревогу, псари сбегаются с дубьем, и Волк оказывается зажат в углу. Понимая, что силой не выбраться, он начинает вести лицемерные мирные переговоры, обещая больше не трогать здешние стада. Однако мудрый седой Ловчий прерывает его речью о том, что с волками иначе мира не делают, кроме как сняв с них шкуру, и спускает на него гончих псов.</p>
                       <p><b>Свинья под Дубом:</b> Неблагодарная Свинья досыта наелась желудей под вековым Дубом, выспалась в его тени, а затем начала нагло разрывать корни дерева своим рылом. Сидящий на ветке Ворон попытался вразумить её, сказав, что это вредит Дубу и он может засохнуть. Но невежественная Свинья ответила, что ей всё равно, засохнет дерево или нет, лишь бы были желуди, не понимая, что желуди растут именно на этом дереве.</p>`
            },
            pushkin: {
                author: "A. C. Пушкин", title: "«Сказка о мёртвой царевне и о семи богатырях»", isExtra: false,
                text: `<p>Царь женится во второй раз на гордой и завистливой женщине, у которой есть волшебное зеркальце. Когда молодая падчерица-царевна вырастает и зеркало признает её более красивой, злая мачеха приказывает чернавке увести девушку в глухой лес и связать под съедение волкам. Чернавка жалеет царевну и отпускает её.</p>
                       <p>Девушка набредает в лесу на терем, где живут семь братьев-богатырей. Они принимают её как родную сестру. Узнав, что царевна жива, мачеха переодевается нищенкой и передает ей отравленное яблоко. Царевна засыпает мертвым сном, и безутешные богатыри хоронят её в хрустальном гробу в пещере. Её жених, королевич Елисей, ищет её по всему свету, опрашивая Солнце, Месяц и Ветер. Узнав от Ветра, где гроб, Елисей разбивает его силой любви, царевна оживает, а злая мачеха умирает от тоски и злости.</p>`
            },
            gogol: {
                author: "Н. В. Гоголь", title: "«Ночь перед Рождеством», «Заколдованное место»", isExtra: false,
                text: `<p><b>Ночь перед Рождеством:</b> Капризная красавица Оксана обещает выйти замуж за влюбленного кузнеца Вакулу, если тот достанет ей золотые черевички, которые носит сама царица. В эту же ночь хитрый Чёрт крадет с неба месяц, чтобы напакостить людям. Вакула ловит Чёрта, седлает его силой крестного знамения и приказывает лететь в Петербург. Там кузнец попадает на прием к Екатерине II и честно просит туфли. Пораженная простотой парня, царица дарит их. Вакула возвращается, а Оксана понимает, что любит его и без всяких туфель.</p>
                       <p><b>Заколдованное место:</b> Дед рассказчика решает станцевать на бахче, но дойдя до определенного места возле грядки с огурцами, его ноги внезапно каменеют. Оглядевшись, он оказывается в незнакомом месте, где замечает горящую на могиле свечку — знак зарытого клада. Дед копает землю, находит котел, но нечистая сила начинает морочить его звуками и чудищами. С трудом притащив котел домой, дед открывает его при семье, но вместо золота там оказывается сор и грязь. С тех пор дед заставил перекопать это место и никогда больше там ничего не росло.</p>`
            },
            turgenev: {
                author: "И. С. Тургенев", title: "Рассказ «Муму»", isExtra: false,
                text: `<p>Глухонемой от рождения богатырь Герасим привезён из деревни в Москву в качестве дворника сумасбродной старой барыни. Он безответно влюбляется в прачку Татьяну, но барыня выдает её замуж за пьяницу Капитона. Единственной радостью Герасима становится спасенная им маленькая собачка, которую он называет Муму.</p>
                       <p>Собака растет ласковой и умной, её любят все в доме, кроме барыни, которой Муму однажды оскалила зубы. Капризная старуха приказывает избавиться от животного. После неудачной попытки тайно продать собаку, Герасим понимает, что её всё равно не оставят в живых, и решает сам исполнить приказ. Он кормит Муму в трактире её любимыми щами, привязывает на лодке к её шее два кирпича и топит в реке. После этого сломленный, но протестующий против тирании Герасим забирает свои вещи и пешком возвращается в родную деревню.</p>`
            },
            tolstoy: {
                author: "Л. Н. Толстой", title: "Рассказ «Кавказский пленник»", isExtra: false,
                text: `<p>Во время Кавказской войны русский офицер Жилин едет в отпуск к матери. По дороге на их обоз нападают татары. Вместе с ним оказывается трусливый офицер Костылин. Из-за нерешительности Костылина обоих берут в плен и заковывают в колодки, требуя огромный выкуп. Жилин пишет неверный адрес на письме, понимая, что у его матери нет денег, и решает бежать сам.</p>
                       <p>В плену Жилин не теряет времени: он чинит часы, делает татарским детям динамические игрушки и заводит дружбу с маленькой дочкой хозяина — Диной. Костылин же только лежит и стонет. Первая попытка побега проваливается из-за Костылина, который стер ноги и не мог идти — их ловят и сажают в глубокую яму. Понимая, что их хотят убить, Жилин просит Дину о помощи. Ночью девочка опускает в яму длинный шест. Жилин выбирается, но Костылин отказывается бежать из-за слабости. С колодкой на ноге Жилин ползет через лес и на рассвете добирается до своих казаков. Костылина позже едва живого выкупают.</p>`
            },
            chekhov: {
                author: "А. П. Чехов", title: "«Лошадиная фамилия», «Мальчики», «Хирургия»", isExtra: false,
                text: `<p><b>Лошадиная фамилия:</b> У отставного генерала Булдеева страшно разболелся зуб. Приказчик Иван Евсеич вспомнил про чудо-знахаря, который умеет заговаривать боль на расстоянии, но забыл его фамилию, помня лишь, что она «лошадиная». Вся усадьба целый день перебирает варианты: Кобылин, Жеребцов, Коренной, Уздечкин... Ничего не подходит. Мучаясь от боли, генерал вызывает доктора, и тот вырывает зуб. Позже доктор уезжает и просит у приказчика продать ему овса. Приказчик хлопает себя по лбу: фамилия знахаря была Овсов!</p>
                       <p><b>Мальчики:</b> Гимназист Володя Королев приезжает домой на рождественские каникулы вместе со своим эксцентричным другом Чечевицыным. Сестры Володи замечают, что мальчики ведут себя странно, шепчутся и изучают карту. Выясняется, что Чечевицын подговорил Володю сбежать в Америку через Сибирь, чтобы воевать с индейцами и добывать золото. Мальчики тайно сбегают, но на следующий день их задерживают в городе в Гостином дворе, где они пытались купить порох. Володя плачет и раскаивается, а гордый Чечевицын оставляет на память в блокноте подпись «Монтигомо Ястребиный Коготь».</p>
                       <p><b>Хирургия:</b> В земскую больницу из-за отсутствия врача приходит дьячок Вонмигласов с острой зубной болью. Его принимает самоуверенный фельдшер Курятин. Хвастаясь своим «опытом» и рассуждая о легкости хирургии, Курятин долго подбирает инструмент и со страшной силой начинает тащить зуб козьей ножкой. Зуб с хрустом ломается, дьячок кричит от дикой боли, а фельдшер вместо извинений начинает ругать пациента за то, что тот дергался. Дьячок уходит, держась за разбитую челюсть и проклиная медицину.</p>`
            },
            zoschenko: {
                author: "М. М. Зощенко", title: "«Лёля и Минька», «Ёлка», «Золотые слова»", isExtra: false,
                text: `<p><b>Ёлка:</b> Маленькие Лёля и Минька пробираются в комнату, где наряжена праздничная новогодняя ёлка для гостей. Лёля начинает съедать подвешенные пастилки, а Минька, завидуя, откусывает кусочек у фарфоровой куклы. На празднике мамы замечают порчу, и разражается скандал. Хозяйка выгоняет гостей, а рассерженный отец тушит ёлку и говорит, что его дети вырастут разбойниками. Этот суровый урок Минька запомнил на всю жизнь и никогда больше не брал чужого.</p>
                       <p><b>Золотые слова:</b> Лёля и Минька любили ужинать со взрослыми гостями, но постоянно встревали в разговоры, шутили и перебивали умных людей. Однажды отец разозлился и запретил им говорить за столом в течение двух месяцев. Дети молчали, но из-за этого послушания не предупредили гостя, что в его чай упало масло. Папа объяснил им «золотые слова»: любые правила нужно применять с умом, ориентируясь на меняющиеся обстоятельства.</p>`
            },
            prishvin: {

        function initSidebar() {
            const reqBox = document.getElementById("req-box");
            const extBox = document.getElementById("ext-box");

            for (let key in literatureDB) {
                const book = literatureDB[key];
                const btn = document.createElement("button");
                btn.className = "book-btn";
                btn.innerText = `${book.author} — ${book.title.split('(')[0].trim()}`;
                btn.onclick = () => selectBook(key, btn);

                if (book.isExtra) {
                    extBox.appendChild(btn);
                } else {
                    reqBox.appendChild(btn);
                }
            }
        }

        function selectBook(key, clickedBtn) {
            document.querySelectorAll(".book-btn").forEach(b => b.classList.remove("active"));
            clickedBtn.classList.add("active");

            const book = literatureDB[key];
            const workspace = document.getElementById("display-workspace");

            const badgeClass = book.isExtra ? "badge ext" : "badge req";
            const badgeText = book.isExtra ? "Дополнительная программа" : "Обязательное чтение";
            const cardBorderClass = book.isExtra ? "content-card extra-border" : "content-card";

            workspace.innerHTML = `
                <div class="${badgeClass}">${badgeText}</div>
                <div class="${cardBorderClass}">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                </div>
                <div class="summary-box" id="summary-text">${book.text}</div>
            `;

            setTimeout(() => {
                document.getElementById("summary-text").classList.add("fade-in");
            }, 50);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initWorkspace() {
            const workspace = document.getElementById("display-workspace");
            workspace.innerHTML = `
                <div style="text-align: center; padding: 60px 0; color: var(--text-muted);">
                    <div style="font-size: 3.5rem; margin-bottom: 15px;">📖</div>
                    <h3>Выберите книгу из списка, чтобы открыть подробный пересказ сюжета.</h3>
                </div>
            `;
        }

        initSidebar();
        initWorkspace();
    </script>
